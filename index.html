    <script>
      // 移动端双击缩放阻止 + 触摸优化
      (function() {
        var lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
          var now = Date.now();
          if (now - lastTouchEnd <= 300) {
            e.preventDefault();
          }
          lastTouchEnd = now;
        }, { passive: false });

        // 检测移动端并移除桌面光标样式类
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
          document.documentElement.classList.add('is-touch-device');
        }
      })();
    </script>

    <div id="root"></div>
